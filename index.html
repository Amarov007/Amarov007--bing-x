<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAROV007 | BingX Official Partner</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b1528 0%, #0f2446 100%);
            --card-bg: rgba(19, 38, 68, 0.6);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8; 
            --bingx-color: #2b66ff;
            --border-color: rgba(56, 189, 248, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 70px;
        }

        /* شريط وسائل التواصل */
        .top-social-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: #070d1a;
            border-bottom: 1px solid var(--border-color);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .top-social-links {
            display: flex;
            gap: 25px;
        }

        /* Hero Section مع الصورة */
        .hero {
            position: relative;
            height: 420px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                        url('bingx-partner.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-content {
            z-index: 2;
            max-width: 90%;
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .hero p {
            font-size: 1.4rem;
            color: #38bdf8;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            background: rgba(43, 102, 255, 0.9);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            margin-top: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- شريط وسائل التواصل -->
    <div class="top-social-bar">
        <div class="top-social-links">
            <!-- أضف روابطك هنا -->
        </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>AMAROV007</h1>
            <p>BingX Official Strategic Partner</p>
            <div class="badge">
                <i class="fas fa-check-circle"></i> شراكة رسمية استراتيجية
            </div>
        </div>
    </section>

    <!-- باقي محتواك هنا -->
    <div style="padding: 30px; text-align: center;">
        <h2>مرحباً بك في صفحتي الرسمية</h2>
        <p>المزيد من المحتوى سيأتي هنا...</p>
    </div>

</body>
</html>
