<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark-theme">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMAROV007 | BingX Official Partner</title>
    
    <!-- الخطوط والأيقونات -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b1528 0%, #0f2446 100%);
            --card-bg: rgba(19, 38, 68, 0.6);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent-color: #38bdf8; 
            --bingx-color: #2b66ff;
            --border-color: rgba(56, 189, 248, 0.1);
            --top-bar-bg: #070d1a;
            --btn-glow: rgba(43, 102, 255, 0.6);
        }

        .light-theme {
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --accent-color: #0284c7;
            --border-color: rgba(2, 132, 199, 0.1);
            --top-bar-bg: #e2e8f0;
            --btn-glow: rgba(2, 132, 199, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-top: 80px;
            transition: all 0.3s ease;
        }

        /* الشريط العلوي */
        .top-social-bar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--top-bar-bg);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; border-bottom: 1px solid var(--border-color);
        }

        .top-social-links { display: flex; gap: 20px; }
        .top-social-icon { font-size: 1.5rem; text-decoration: none; transition: 0.3s; }
        .top-social-icon:hover { transform: translateY(-3px); }

        .top-tg { color: #0088cc; }
        .top-wa { color: #25D366; }
        .top-yt { color: #FF0000; }

        /* حاوية المحتوى */
        .wrapper { max-width: 800px; margin: 0 auto; padding: 20px; text-align: center; }

        .badge {
            background: linear-gradient(90deg, #ff9900, #ff5500);
            color: white; padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; margin-bottom: 15px; display: inline-block;
        }

        .profile-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 20px; }
        .profile-title span { color: var(--accent-color); }

        /* بطاقة BingX */
        .bingx-partner-card {
            background: var(--card-bg);
            border: 2px solid var(--bingx-color);
            border-radius: 25px; padding: 40px 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .partner-status { color: var(--accent-color); font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; display: block;}

        /* زر التسجيل - الأهم للتلجرام */
        .cta-register-btn {
            display: inline-flex; align-items: center; gap: 10px;
            background: var(--bingx-color); color: white !important;
            text-decoration: none; padding: 15px 35px;
            border-radius: 50px; font-weight: 800; font-size: 1.2rem;
            margin-top: 25px; box-shadow: 0 5px 15px var(--btn-glow);
            transition: 0.3s;
        }

        .cta-register-btn:hover { transform: scale(1.05); opacity: 0.9; }

        /* زر تبديل الوضع */
        .theme-toggle-floating {
            position: fixed; bottom: 25px; right: 25px;
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--card-bg); border: 2px solid var(--accent-color);
            color: var(--accent-color); cursor: pointer; font-size: 1.2rem;
            z-index: 10000;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px var(--btn-glow); }
            50% { box-shadow: 0 0 25px var(--btn-glow); }
            100% { box-shadow: 0 0 10px var(--btn-glow); }
        }
        .cta-register-btn { animation: pulseGlow 2s infinite; }
    </style>
</head>
<body>

    <div class="top-social-bar">
        <div class="top-social-links">
            <a href="#" class="top-social-icon top-tg"><i class="fab fa-telegram"></i></a>
            <a href="#" class="top-social-icon top-wa"><i class="fab fa-whatsapp"></i></a>
            <a href="#" class="top-social-icon top-yt"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <button class="theme-toggle-floating" id="themeBtn">
        <i class="fas fa-sun"></i>
    </button>

    <div class="wrapper">
        <header>
            <div class="badge"><i class="fas fa-check-circle"></i> شريك موثق</div>
            <h1 class="profile-title">AMAROV<span>007</span></h1>
        </header>

        <div class="bingx-partner-card">
            <span class="partner-status">OFFICIAL PARTNER</span>
            <h2 style="font-size: 2rem; margin-bottom: 15px;">BingX</h2>
            <p style="color: var(--text-muted); line-height: 1.6;">
                سجل الآن من خلال الرابط الرسمي للحصول على مكافآت حصرية تصل إلى 5000$ وميزات تداول متقدمة.
            </p>
            
            <!-- زر الرابط المعدل -->
            <a href="https://bingx.com" target="_blank" rel="noopener noreferrer" class="cta-register-btn">
                <i class="fas fa-user-plus"></i>
                <span>ابدأ التسجيل الآن</span>
            </a>
        </div>
    </div>

    <script>
        const btn = document.getElementById('themeBtn');
        btn.addEventListener('click', () => {
            document.documentElement.classList.toggle('light-theme');
            const icon = btn.querySelector('i');
            if(document.documentElement.classList.contains('light-theme')) {
                icon.className = 'fas fa-moon';
            } else {
                icon.className = 'fas fa-sun';
            }
        });
    </script>
</body>
</html>
